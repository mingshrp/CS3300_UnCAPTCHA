<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UnCAPTCHA</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      
      width: 260px;
      
    }

    /*  OUTER CONTAINER (THIS FIXES YOUR PROBLEM) */
    .popup-container {
      background-color: #c5daee;
      border-radius: 20px;
      padding: 15px;
    }

    /* SWITCH */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      background-color: #ccc;
      border-radius: 20px;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      transition: 0.3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background-color: #6ea4d7;
    }

    input:checked + .slider:before {
      transform: translateX(18px);
    }

    h1 {
      font-size: 22px;
      margin: 0;
      color: #6ea4d7;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }

    .status-box {
      margin-top: 15px;
      padding: 10px;
      background: white;
      border-radius: 16px;
    }

    .status {
      font-weight: bold;
      font-size: 14px;
    }

    .details {
      font-size: 12px;
      color: #555;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <!-- 🔥 WRAPPER ADDED -->
  <div class="popup-container">

    <!-- HEADER -->
    <div style="display: flex; align-items: center;">
      <img src="../images/icons.png" style="height:30px; margin-right:8px;">
      <h1>UnCAPTCHA</h1>
    </div>

    <!-- VERSION + TOGGLE -->
    <div class="row">
      <span style="font-size: 12px;">Version: 0.2.0</span>

      <label class="switch">
        <input type="checkbox" id="toggleButton">
        <span class="slider"></span>
      </label>
    </div>

    <!-- STATUS -->
    <div class="status-box">
      <div id="status" class="status">Checking...</div>
      <div id="details" class="details"></div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
